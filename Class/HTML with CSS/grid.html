<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:black;
        }
        .child{
            background-color: yellow;
            color: green;
            font-size: 40px;
            display: grid;
            justify-content: center;
            align-items: center;
            
        }
        .parent{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: 100px 100px 100px;
            row-gap: 5px;
            column-gap: 8px;
        }
        .buttons{
            background-color: black;
            color: aliceblue;
            font-size: 40px;
            width: 50px;
        }
        .buttons:hover{
            background-color: red;
            color: aqua;
            font-size: 60px;
            width: 70px;
        }
        #box1{
            grid-column: span 3;
        }
        #box2{
            grid-row:span 4;
        }
        #box3{
            grid-column: span 2;
        }
        #box4{
            grid-column: span 2;
        }
        #box5{
            grid-column: span 2;
        }
        #box6{
            grid-column: span 2;
        }
        #box7{
            grid-column: span 3;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="box1">
            Header
        </div>
        <div class="child" id="box2">Side Bar</div>
        <div class="child" id="box3">Content1</div>
        <div class="child" id="box4">Content2</div>
        <div class="child" id="box5">Content3</div>
        <div class="child" id="box6">Content4</div>
        <div class="child" id="box7">Footer</div>
        <!-- <div class="child"><button class="buttons" id="box8" title="8">8</button></div>
        <div class="child"><button class="buttons" id="box9" title="9">9</button></div> -->
        
    </div>
</body>
</html>

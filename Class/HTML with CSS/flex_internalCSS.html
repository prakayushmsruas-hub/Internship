<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
   <style>
    h1{
        display:flex;
        background:linear-gradient(135deg,white,purple,blue,red,green,grey,yellow,white);
        color:white;
        margin: 2px;
        padding: 10px;
    }
    div{
        display: flex;
        background-color: black;
        padding: 10xp;
        width:100%;
        font-family: cursive;
        text-transform: capitalize;
        flex-wrap: wrap;
        justify-content:space-evenly;
        align-items: center;

    }
   </style>
</head>
<body>
    <div> 
        <h1>one</h1>
        <h1>two</h1>
        <h1>three</h1>
        <h1>four</h1>
        <h1>five</h1>
        <h1>six</h1>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
   <style>
    h1{
        display:flex;
        background:linear-gradient(135deg,white,purple,blue,red,green,grey,yellow,white);
        color:white; 
        flex-grow: 1;
    }
    h2{
        display:flex;
        background:linear-gradient(135deg,white,purple,blue,red,green,grey,yellow,white);
        color:white; 
        flex-grow: 2;
    }
    h3{
        display:flex;
        background:linear-gradient(135deg,white,purple,blue,red,green,grey,yellow,white);
        color:white; 
        flex-grow: 3;
    }
    div{
        display: flex;

    }
   </style>
</head>
<body>
    <div> 
        <h1>one</h1>
        <h2>two</h2>
        <h3>three</h3>
        <!-- <h1>four</h1>
        <h1>five</h1>
        <h1>six</h1> -->
    </div>
</body>
</html>

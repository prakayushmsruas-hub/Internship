<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1><u> Registration Form </u></h1>
    <form action=""></form>
    <label for="Name">Name:</label>
    <input type="text" placeholder="Enter your name" required><br><br>

     <label for="Email">Email:</label>
    <input type="email" placeholder="Enter your email" required><br><br>

    <label for="Password">Password:</label>
    <input type="password" placeholder="Enter your password" required><br><br>

    <label for="Gender">Gender:</label><br>
    <input type="radio" name="Gender" value="Male"> Male<br>
    <input type="radio" name="Gender" value="Female"> Female<br>

     <label for="subscribe">Subscribe:</label>
    <input type="checkbox" name="subscribe" value="Yes"> Yes<br><br>

     <select name="Country" id="Country" required>
        <option value="">Select your home Counrty</option>
        <option value="India">INDIA</option>
        <option value="Usa">USA</option>
        <option value="Canada">CANADA</option>
     </select><br>

        <br><label for="Message">Message:</label><br>
        <textarea name="Message" id="Message" placeholder="Enter your message"></textarea>

        <br><br><label for="file">Upload your file:</label>
        <input type="file" name="file" id="file"><br><br>

        <label for="Date">Date:</label>
        <input type="date" name="Date" id="Date"><br><br>
        
    <button type="submit">Submit</button>
</body>
</html>
